<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Khushi ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  overflow:hidden;
}

/* Background */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('khushi.jpg') no-repeat center/cover;
  filter:brightness(0.4);
  z-index:-1;
}

/* Container */
.container{
  max-width:750px;
  padding:20px;
  z-index:2;
}

/* Name glow */
h1{
  font-size:50px;
  margin-bottom:20px;
  text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
}

/* Typing */
#text{
  font-size:20px;
  line-height:1.8;
  white-space:pre-line;
  border-right:2px solid white;
  display:inline-block;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{border-color:transparent;}
}

/* Heart */
.heart{
  font-size:55px;
  margin-top:20px;
  animation:beat 1s infinite;
}
@keyframes beat{
  50%{transform:scale(1.3);}
}

/* Button */
button{
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
  background:#ff1f4d;
}

/* Falling hearts */
.falling-heart{
  position:absolute;
  color:#ff4d6d;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="container">

<h1>Khushi... ❤️</h1>

<div id="text"></div>

<div class="heart">❤️</div>

<button onclick="forgive()">Forgive Me ❤️</button>

</div>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
  const music = document.getElementById("bgMusic");

  function playMusic() {
    music.play().catch(() => {});
    document.removeEventListener("click", playMusic);
  }

  // Try auto play
  window.addEventListener("load", () => {
    music.play().catch(() => {});
  });

  // Force play on first touch
  document.addEventListener("click", playMusic);
</script>

<script>
const message = `Agar aap yeh dekh rahi hain... toh main bas itna kehna chahta hoon...

Sorry... 💔

Galti meri thi, par aap mere liye aaj bhi utni hi important hain.

Chahe aap baat karein ya na karein...
main aapko khona nahi chahta. ❤️

Main yahin hoon... jab aap ready ho.`;

let i = 0;
function typeWriter(){
  if(i < message.length){
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter,40);
  }
}
typeWriter();

/* Falling hearts */
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="falling-heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),6000);
},300);

/* Button click effect */
function forgive(){
  document.getElementById("text").innerHTML = "Thank you... ❤️\nAapne smile ki, bas wahi kaafi hai mere liye 😊";
  
  for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="falling-heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize="25px";
    heart.style.animationDuration="2s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
  </html>
